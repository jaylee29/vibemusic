<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Vibe Music | CloudPlay Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        /* DARK THEME (Default) */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-primary: #8a2be2;
            --accent-secondary: #4a00e0;
            --accent-tertiary: #00d4ff;
            --accent-glow: rgba(138, 43, 226, 0.4);
            --accent-gradient: linear-gradient(135deg, #8a2be2, #4a00e0, #00d4ff);
            --border-color: #2a2a35;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --input-bg: #22222a;
            --hover-bg: #2a2a35;
            --lyrics-highlight: #8a2be2;
            --lyrics-bg: rgba(138, 43, 226, 0.15);
            --player-bg: rgba(18, 18, 26, 0.98);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --hover-shadow: 0 20px 40px rgba(138, 43, 226, 0.3);
            --header-gradient: linear-gradient(135deg, #8a2be2, #4a00e0);
        }

        /* LIGHT THEME */
        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8f9fa;
            --text-primary: #1a1a2a;
            --text-secondary: #4a4a6a;
            --accent-primary: #8a2be2;
            --accent-secondary: #6f42c1;
            --accent-tertiary: #0099ff;
            --accent-glow: rgba(138, 43, 226, 0.2);
            --accent-gradient: linear-gradient(135deg, #8a2be2, #6f42c1, #0099ff);
            --border-color: #e0e0f0;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --input-bg: #f5f5fa;
            --hover-bg: #f0f0fa;
            --lyrics-highlight: #8a2be2;
            --lyrics-bg: rgba(138, 43, 226, 0.08);
            --player-bg: rgba(255, 255, 255, 0.98);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 20px 40px rgba(138, 43, 226, 0.15);
            --header-gradient: linear-gradient(135deg, #8a2be2, #6f42c1);
        }

/* CLOUDPLAY PURPLE NEON THEME */
[data-theme="cloudplay"] {
    --bg-primary: #1a0033;
    --bg-secondary: #2a0050;
    --bg-card: rgba(255, 255, 255, 0.05);
    --bg-card-hover: rgba(255, 255, 255, 0.08);

    --text-primary: #f3e8ff;
    --text-secondary: #d8b4fe;

    --accent-primary: #c084fc;
    --accent-secondary: #a855f7;
    --accent-tertiary: #9333ea;

    --accent-glow: rgba(168, 85, 247, 0.6);
    --accent-gradient: linear-gradient(135deg, #c084fc, #a855f7, #7e22ce);

    --border-color: rgba(255, 255, 255, 0.1);
    --shadow-color: rgba(168, 85, 247, 0.3);

    --input-bg: rgba(255, 255, 255, 0.08);
    --hover-bg: rgba(168, 85, 247, 0.15);

    --lyrics-highlight: #c084fc;
    --lyrics-bg: rgba(192, 132, 252, 0.15);

    --player-bg: rgba(30, 0, 60, 0.85);

    --card-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
    --hover-shadow: 0 20px 50px rgba(168, 85, 247, 0.5);

    --header-gradient: linear-gradient(135deg, #c084fc, #a855f7, #7e22ce);

    backdrop-filter: blur(20px);
}

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        #app {
            max-width: 100%;
            margin: 0 auto;
            padding: 12px;
            padding-bottom: 100px;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .gradient-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--accent-gradient);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            animation: sphereMove 30s ease-in-out infinite;
            top: -300px;
            right: -150px;
        }

        .gradient-sphere-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            animation: sphereMove2 25s ease-in-out infinite;
            bottom: -250px;
            left: -100px;
        }

        @keyframes sphereMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 80px) scale(1.1); }
            66% { transform: translate(-40px, 40px) scale(0.9); }
        }

        @keyframes sphereMove2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-80px, -40px) scale(1.2); }
            66% { transform: translate(40px, -80px) scale(0.8); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-100px) translateX(100px) rotate(360deg); opacity: 0; }
        }

        #auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .auth-container {
            background: var(--bg-card);
            padding: 30px 20px;
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4), 0 0 0 2px var(--accent-glow);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            z-index: 10;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: var(--accent-gradient);
            border-radius: 42px;
            z-index: -1;
            animation: borderPulse 3s ease-in-out infinite;
            opacity: 0.5;
        }

        .auth-container h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            background: var(--bg-primary);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid var(--accent-primary);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            border-radius: 60px;
        }

        .auth-tab.active {
            color: white;
            background: var(--accent-gradient);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            padding-left: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            z-index: 2;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--accent-glow);
            margin-top: 15px;
        }

        .error-message {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            padding: 8px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 30px;
        }

        #main-app {
            display: none;
        }

        .app-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .app-title h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .welcome-badge {
            display: block;
            text-align: center;
            padding: 5px 15px;
            background: var(--bg-card-hover);
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid var(--accent-primary);
        }

        .app-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .glass-btn {
            padding: 10px 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--accent-primary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .glass-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--accent-primary);
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 15px;
            box-shadow: var(--card-shadow);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 40%;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 3px;
        }

        .view-all {
            color: var(--accent-primary);
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 30px;
            background: var(--bg-card);
            border: 1px solid var(--accent-primary);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .song-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: var(--card-shadow);
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
            border-color: var(--accent-primary);
        }

        .song-card.playing {
            border: 2px solid var(--accent-primary);
            animation: cardPulse 2s infinite;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 15px var(--accent-glow); }
            50% { box-shadow: 0 0 30px var(--accent-glow); }
        }

        .song-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(96, 165, 250, 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            border-radius: 16px;
        }

        .song-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay span {
            font-size: 40px;
            color: white;
        }

        .song-title {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .song-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 3px 10px var(--accent-glow);
        }

        .song-btn.secondary {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border: 1px solid var(--accent-primary);
        }

        .lyrics-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .lyrics-container {
            max-height: 450px;
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }
        .lyrics-container::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 10px;
        }

        .lyric-line {
            font-size: 18px;
            text-align: center;
            padding: 14px 20px;
            border-radius: 25px;
            opacity: 0.45;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            margin: 8px 0;
            line-height: 1.5;
            font-weight: 500;
        }

        .lyric-line:hover {
            opacity: 0.8;
            background: var(--bg-card-hover);
        }

        .lyric-line.active {
            opacity: 1;
            transform: scale(1.02);
            color: var(--accent-primary);
            font-weight: 700;
            background: var(--lyrics-bg);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .stats-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: var(--bg-card-hover);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid var(--accent-primary);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .artist-list {
            background: var(--bg-card-hover);
            border-radius: 25px;
            padding: 15px;
        }

        .artist-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .artist-item span:last-child {
            background: var(--accent-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .music-player {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: var(--player-bg);
            border-radius: 60px;
            box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 2px var(--accent-glow);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent-primary);
            z-index: 1000;
            transition: all 0.3s ease;
            overflow: hidden;
            padding: 15px;
        }

        .music-player.minimized {
            width: auto;
            max-width: 200px;
            right: 15px;
            left: auto;
            bottom: 20px;
            border-radius: 50px;
            background: var(--accent-gradient);
            cursor: pointer;
            padding: 10px 20px;
        }

        .music-player.minimized .player-info,
        .music-player.minimized .player-controls,
        .music-player.minimized .progress-container,
        .music-player.minimized .volume-control,
        .music-player.minimized .mini-toggle {
            display: none;
        }

        .music-player.minimized .now-playing-title {
            font-size: 14px;
            color: white;
            display: block;
        }

        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .now-playing-title {
            font-weight: 700;
            font-size: 16px;
        }

        .now-playing-artist {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.play-pause {
            background: var(--accent-gradient);
            color: white;
            width: 56px;
            height: 56px;
            font-size: 26px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 12px;
            min-width: 35px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 10px;
            width: 0%;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: var(--border-color);
            border-radius: 5px;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent-gradient);
            border-radius: 50%;
            cursor: pointer;
        }

        .mini-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
        }

        .lyrics-toggle {
            position: fixed;
            bottom: 100px;
            right: 15px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 20px var(--accent-glow);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: var(--accent-gradient);
            color: white;
            padding: 16px 20px;
            border-radius: 50px;
            box-shadow: 0 15px 30px var(--shadow-color);
            animation: notificationSlide 0.5s ease-out;
            z-index: 2000;
            text-align: center;
            font-size: 15px;
        }

        @keyframes notificationSlide {
            0% { opacity: 0; transform: translateY(-100px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .songs-grid {

            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('theme-name').textContent = themeNames[theme];
        }

        window.cycleTheme = function() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;

                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = 15 + Math.random() * 15 + 's';
                p.style.width = Math.random() * 6 + 2 + 'px';
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `✨ ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2500);
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ========== AUTH FUNCTIONS ==========
        window.switchAuthTab = function(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if(tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        };

        window.handleRegister = function() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const errorEl = document.getElementById('register-error');

            if(!name || !email || !password) {
                errorEl.textContent = '⚠️ All fields are required';
                return;
            }
            if(!validateEmail(email)) {
                errorEl.textContent = '⚠️ Invalid email format';
                return;
            }
            if(password.length < 6) {
                errorEl.textContent = '⚠️ Password must be at least 6 characters';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if(users.find(u => u.email === email)) {
                errorEl.textContent = '⚠️ User already exists';
                return;
            }

            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            showNotification('✨ Registration successful!');
            showMainApp();
        };

        window.handleLogin = function() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if(!email || !password) {
                errorEl.textContent = '⚠️ All fields are required';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if(!user) {
                errorEl.textContent = '⚠️ Invalid email or password';
                return;
            }

            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            showNotification(`🎉 Welcome back, ${user.name}!`);
            showMainApp();
        };

        window.handleLogout = function() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            audio.pause();
            isPlaying = false;
            if(listeningTimeInterval) clearInterval(listeningTimeInterval);
            showNotification('👋 Logged out successfully!');
        };

        function showMainApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('welcome-user').textContent = `Welcome, ${currentUser.name}! ✨`;
            loadUserData();
            renderSongs();
            updateStats();
            
            if(listeningTimeInterval) clearInterval(listeningTimeInterval);
            listeningTimeInterval = setInterval(() => {
                if(currentUser && isPlaying) {
                    const stats = JSON.parse(localStorage.getItem(`stats_${currentUser.email}`) || '{"totalListens":0,"artistPlays":{},"listeningTime":0}');
                    stats.listeningTime++;
                    localStorage.setItem(`stats_${currentUser.email}`, JSON.stringify(stats));
                    updateStats();
                }
            }, 1000);
        }

        // ========== RENDER FUNCTIONS ==========
        function renderSongs() {
            const container = document.getElementById('songs-container');
            const filteredSongs = SONGS.filter(song => 
                song.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                song.artist.toLowerCase().includes(searchQuery.toLowerCase())
            );

            if(filteredSongs.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">🔍 No songs found</div>';
                return;
            }

            container.innerHTML = filteredSongs.map((song) => {
                const originalIndex = SONGS.findIndex(s => s.filename === song.filename);
                return `
                    <div class="song-card ${originalIndex === currentSongIndex && isPlaying ? 'playing' : ''}" onclick="playSong(${originalIndex})">
                        <div class="song-thumbnail" style="background-image: url('${song.thumbnail}')">
                            <div class="play-overlay"><span>▶️</span></div>
                        </div>
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                        <div class="song-actions">
                            <button class="song-btn" onclick="event.stopPropagation(); addToPlaylist(${originalIndex})">➕ Add</button>
                            <button class="song-btn secondary" onclick="event.stopPropagation(); toggleOffline(${originalIndex})">💾 Save</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.searchSongs = function(query) {
            searchQuery = query.toLowerCase();
            renderSongs();
        };

        window.showAllSongs = function() {
            searchQuery = '';
            document.getElementById('search-input').value = '';
            renderSongs();
            showNotification('Showing all songs');
        };

        // ========== PLAYLIST FUNCTIONS ==========
        window.addToPlaylist = function(songIndex) {
            const playlist = JSON.parse(localStorage.getItem(`playlist_${currentUser.email}`) || '[]');
            if(!playlist.includes(songIndex)) {
                playlist.push(songIndex);
                localStorage.setItem(`playlist_${currentUser.email}`, JSON.stringify(playlist));
                renderPlaylist();
                showNotification('➕ Added to playlist!');
            } else {
                showNotification('⚠️ Already in playlist!');
            }
        };

        window.removeFromPlaylist = function(songIndex) {
            let playlist = JSON.parse(localStorage.getItem(`playlist_${currentUser.email}`) || '[]');
            playlist = playlist.filter(index => index !== songIndex);
            localStorage.setItem(`playlist_${currentUser.email}`, JSON.stringify(playlist));
            renderPlaylist();
            showNotification('➖ Removed from playlist!');
        };

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            const playlist = JSON.parse(localStorage.getItem(`playlist_${currentUser.email}`) || '[]');
            
            if(playlist.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">✨ Your playlist is empty ✨</div>';
                return;
            }

            container.innerHTML = playlist.map(songIndex => {
                const song = SONGS[songIndex];
                return `
                    <div class="song-card ${songIndex === currentSongIndex && isPlaying ? 'playing' : ''}" onclick="playSong(${songIndex})">
                        <div class="song-thumbnail" style="background-image: url('${song.thumbnail}')">
                            <div class="play-overlay"><span>▶️</span></div>
                        </div>
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                        <button class="song-btn" onclick="event.stopPropagation(); removeFromPlaylist(${songIndex})">❌ Remove</button>
                    </div>
                `;
            }).join('');
        }

        window.showAllPlaylist = function() {
            const playlist = JSON.parse(localStorage.getItem(`playlist_${currentUser.email}`) || '[]');
            showNotification(playlist.length ? `You have ${playlist.length} songs` : 'Playlist empty');
        };

        // ========== OFFLINE FUNCTIONS ==========
        window.toggleOffline = function(songIndex) {
            const offlineSongs = JSON.parse(localStorage.getItem(`offline_${currentUser.email}`) || '[]');
            if(offlineSongs.includes(songIndex)) {
                const updated = offlineSongs.filter(i => i !== songIndex);
                localStorage.setItem(`offline_${currentUser.email}`, JSON.stringify(updated));
                showNotification('📴 Removed from offline!');
            } else {
                offlineSongs.push(songIndex);
                localStorage.setItem(`offline_${currentUser.email}`, JSON.stringify(offlineSongs));
                showNotification('📲 Saved offline!');
            }
            renderOfflineSongs();
        };

        function renderOfflineSongs() {
            const container = document.getElementById('offline-container');
            const offlineSongs = JSON.parse(localStorage.getItem(`offline_${currentUser.email}`) || '[]');
            
            if(offlineSongs.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;">✨ No songs saved offline ✨</div>';
                return;
            }

            container.innerHTML = offlineSongs.map(songIndex => {
                const song = SONGS[songIndex];
                return `
                    <div class="song-card ${songIndex === currentSongIndex && isPlaying ? 'playing' : ''}" onclick="playSong(${songIndex})">
                        <div class="song-thumbnail" style="background-image: url('${song.thumbnail}')">
                            <div class="play-overlay"><span>▶️</span></div>
                        </div>
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                        <button class="song-btn secondary" onclick="event.stopPropagation(); toggleOffline(${songIndex})">🗑️ Remove</button>
                    </div>
                `;
            }).join('');
        }

        window.showAllOffline = function() {
            const offline = JSON.parse(localStorage.getItem(`offline_${currentUser.email}`) || '[]');
            showNotification(offline.length ? `${offline.length} offline songs` : 'No offline songs');
        };

        // ========== PLAYER FUNCTIONS ==========
        window.playSong = function(index) {
            if(!currentUser) return;
            
            currentSongIndex = index;
            const song = SONGS[index];
            
            audio.src = `music/${song.filename}`;
            audio.load();
            
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('play-pause-btn').innerHTML = '⏸️';
                document.getElementById('current-song-title').textContent = song.title;
                document.getElementById('current-song-artist').textContent = song.artist;
                
                if(showLyrics) {
                    renderLyrics();
                    startLyricsSync();
                }
                
                renderSongs();
                renderPlaylist();
                renderOfflineSongs();
                
                showNotification(`🎵 Now playing: ${song.title}`);
                updateListeningStats(index);
            }).catch(() => {
                showNotification('⚠️ Please add MP3 files to music/ folder');
            });
        };

        window.togglePlay = function() {
            if(!audio.src) return;
            
            if(isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('play-pause-btn').innerHTML = '▶️';
                stopLyricsSync();
            } else {
                audio.play();
                isPlaying = true;
                document.getElementById('play-pause-btn').innerHTML = '⏸️';
                startLyricsSync();
            }
        };

        window.playNext = function() {
            let nextIndex;
            if(shuffleMode) {
                do {
                    nextIndex = Math.floor(Math.random() * SONGS.length);
                } while(nextIndex === currentSongIndex && SONGS.length > 1);
            } else {
                nextIndex = (currentSongIndex + 1) % SONGS.length;
            }
            playSong(nextIndex);
        };

        window.playPrevious = function() {
            let prevIndex = (currentSongIndex - 1 + SONGS.length) % SONGS.length;
            playSong(prevIndex);
        };

        window.toggleShuffle = function() {
            shuffleMode = !shuffleMode;
            const btn = document.getElementById('shuffle-btn');
            btn.style.opacity = shuffleMode ? '1' : '0.6';
            showNotification(`🔀 Shuffle ${shuffleMode ? 'ON' : 'OFF'}`);
        };

        window.toggleRepeat = function() {
            repeatMode = !repeatMode;
            const btn = document.getElementById('repeat-btn');
            btn.style.opacity = repeatMode ? '1' : '0.6';
            showNotification(`🔁 Repeat ${repeatMode ? 'ON' : 'OFF'}`);
        };

        window.changeVolume = function(value) {
            audio.volume = value / 100;
        };

        window.seekTo = function(e) {
            if(!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const clickPosition = (e.clientX - rect.left) / rect.width;
            audio.currentTime = clickPosition * audio.duration;
        };

        window.togglePlayerSize = function() {
            const player = document.getElementById('music-player');
            isPlayerMinimized = !isPlayerMinimized;
            if(isPlayerMinimized) {
                player.classList.add('minimized');
            } else {
                player.classList.remove('minimized');
            }
        };

        document.addEventListener('click', function(e) {
            const player = document.getElementById('music-player');
            if(isPlayerMinimized && player.contains(e.target) && !e.target.classList.contains('mini-toggle')) {
                togglePlayerSize();
            }
        });

        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
            if(showLyrics && isPlaying) updateCurrentLyric();
        });

        audio.addEventListener('ended', () => {
            if(repeatMode) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        // ========== LYRICS FUNCTIONS (SCROLLABLE) ==========
        window.toggleLyrics = function() {
            const lyricsSection = document.getElementById('lyrics-section');
            const lyricsBtn = document.getElementById('lyrics-toggle-btn');
            
            showLyrics = !showLyrics;
            
            if(showLyrics) {
                lyricsSection.style.display = 'block';
                lyricsBtn.innerHTML = '<span>📜</span> Hide Lyrics';
                renderLyrics();
                if(isPlaying) startLyricsSync();
            } else {
                lyricsSection.style.display = 'none';
                lyricsBtn.innerHTML = '<span>📜</span> Show Lyrics';
                stopLyricsSync();
            }
        };

        function renderLyrics() {
            const container = document.getElementById('lyrics-container');
            const currentSong = SONGS[currentSongIndex];
            
            if(!currentSong.lyrics || currentSong.lyrics.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">✨ No lyrics available ✨</div>';
                return;
            }

            container.innerHTML = currentSong.lyrics.map((lyric, index) => `
                <div class="lyric-line" data-time="${lyric.time}" data-index="${index}" onclick="seekToLyric(${lyric.time})">
                    ${lyric.text}
                </div>
            `).join('');
        }

        window.seekToLyric = function(time) {
            audio.currentTime = time;
            if(!isPlaying) togglePlay();
        };

        function startLyricsSync() {
            stopLyricsSync();
            lyricsUpdateInterval = setInterval(updateCurrentLyric, 150);
        }

        function stopLyricsSync() {
            if(lyricsUpdateInterval) {
                clearInterval(lyricsUpdateInterval);
                lyricsUpdateInterval = null;
            }
        }

        function updateCurrentLyric() {
            if(!audio.duration || !isPlaying || !showLyrics) return;

            const currentTime = audio.currentTime;
            const currentSong = SONGS[currentSongIndex];
            
            if(!currentSong.lyrics) return;

            let activeIndex = -1;
            for(let i = currentSong.lyrics.length - 1; i >= 0; i--) {
                if(currentTime >= currentSong.lyrics[i].time) {
                    activeIndex = i;
                    break;
                }
            }

            const lyricsLines = document.querySelectorAll('.lyric-line');
            const container = document.getElementById('lyrics-container');
            const isUserScrolling = container.hasAttribute('data-user-scrolling');
            
            lyricsLines.forEach((line, index) => {
                if(index === activeIndex) {
                    line.classList.add('active');
                    if(!isUserScrolling) {
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    line.classList.remove('active');
                }
            });
        }

        // Allow user to scroll freely without auto-scroll interference
        const lyricsContainer = document.getElementById('lyrics-container');
        let scrollTimeout;
        if(lyricsContainer) {
            lyricsContainer.addEventListener('scroll', function() {
                this.setAttribute('data-user-scrolling', 'true');
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    this.removeAttribute('data-user-scrolling');
                }, 2000);
            });
        }

        // ========== STATS FUNCTIONS ==========
        function updateListeningStats(songIndex) {
            const stats = JSON.parse(localStorage.getItem(`stats_${currentUser.email}`) || '{"totalListens":0,"artistPlays":{},"listeningTime":0}');
            stats.totalListens++;
            stats.artistPlays[SONGS[songIndex].artist] = (stats.artistPlays[SONGS[songIndex].artist] || 0) + 1;
            localStorage.setItem(`stats_${currentUser.email}`, JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            const stats = JSON.parse(localStorage.getItem(`stats_${currentUser.email}`) || '{"totalListens":0,"artistPlays":{},"listeningTime":0}');
            
            document.getElementById('total-listens').textContent = stats.totalListens;
            
            const minutes = Math.floor(stats.listeningTime / 60);
            document.getElementById('listening-time').textContent = minutes + ' min';
            
            let mostPlayed = '-';
            let maxPlays = 0;
            Object.entries(stats.artistPlays).forEach(([artist, plays]) => {
                if(plays > maxPlays) {
                    maxPlays = plays;
                    mostPlayed = artist;
                }
            });
            document.getElementById('most-played-artist').textContent = mostPlayed;
            
            const rankingEl = document.getElementById('artist-ranking');
            const sortedArtists = Object.entries(stats.artistPlays).sort((a, b) => b[1] - a[1]);
            
            if(sortedArtists.length === 0) {
                rankingEl.innerHTML = '<div style="text-align:center;padding:20px;">✨ No stats available yet ✨</div>';
                return;
            }

            rankingEl.innerHTML = sortedArtists.map(([artist, plays]) => `
                <div class="artist-item">
                    <span>🎤 ${artist}</span>
                    <span>${plays} plays</span>
                </div>
            `).join('');
        }

        // ========== LOAD USER DATA ==========
        function loadUserData() {
            renderPlaylist();
            renderOfflineSongs();
            updateStats();
        }

        // ========== INITIALIZATION ==========
        function init() {
            const savedTheme = localStorage.getItem('theme');
            if(savedTheme) {
                const themeIndex = themes.indexOf(savedTheme);
                if(themeIndex !== -1) {
                    currentThemeIndex = themeIndex;
                    applyTheme(savedTheme);
                } else {
                    applyTheme('dark');
                }
            } else {
                applyTheme('dark');
            }
            
            const savedUser = localStorage.getItem('currentUser');
            if(savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainApp();
            }
            
            audio.volume = 0.7;
        }

        init();
    </script>
</body>
</html>
